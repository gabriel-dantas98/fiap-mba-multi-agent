name: Deploy GitHub Pages

# Publica o site estático da disciplina AI Business Strategy no GitHub Pages.
# Fonte: apps/static-web-apps/ai-business-strategy/ + os assets globais de brand/.
# O staging é feito por scripts/build_pages.sh (mesma lógica usada no preview local),
# já que o Pages não serve subpastas arbitrárias nem múltiplas pastas nativamente.

on:
  push:
    branches: [main]
    paths:
      - "apps/static-web-apps/ai-business-strategy/**"
      - "apps/group_one/bragdev/dist/**"
      - "brand/**"
      - "scripts/build_pages.sh"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Uma publicação por vez; cancela execuções antigas em andamento.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - name: Stage site + brand assets
        run: bash scripts/build_pages.sh

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
